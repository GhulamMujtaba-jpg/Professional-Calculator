<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Professional Calculator | Precision & Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevent accidental text selection while tapping */
        }

        body {
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 20px;
        }

        /* Main calculator card */
        .calculator {
            background: rgba(22, 30, 40, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 24px 22px 32px 22px;
            width: 100%;
            max-width: 480px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Display area */
        .display {
            background: #0b0f17;
            border-radius: 36px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: right;
            word-wrap: break-word;
            word-break: break-word;
        }

        .previous-operand {
            min-height: 32px;
            font-size: 1.1rem;
            color: #9aa9bb;
            letter-spacing: 0.5px;
            font-weight: 400;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .current-operand {
            font-size: 3.1rem;
            font-weight: 600;
            color: #f0f3f8;
            line-height: 1.2;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        /* Button grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        /* Universal button style */
        .btn {
            background: #1e2a32;
            border: none;
            border-radius: 32px;
            padding: 18px 0;
            font-size: 1.5rem;
            font-weight: 500;
            font-family: inherit;
            color: #eef4ff;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #0f141c;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f141c;
        }

        /* Special button variants */
        .btn-function {
            background: #2c3e4e;
            color: #bbe1ff;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .btn-operator {
            background: #f39c12;
            color: #1e2a2f;
            font-weight: 700;
            font-size: 1.7rem;
            box-shadow: 0 5px 0 #b36b0e;
        }

        .btn-operator:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b36b0e;
        }

        .btn-equals {
            background: #2ecc71;
            color: #0a2f1f;
            font-weight: 800;
            font-size: 1.8rem;
            box-shadow: 0 5px 0 #1f8f4b;
        }

        .btn-clear {
            background: #c0392b;
            color: #ffddda;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 #7e2a1f;
        }

        .btn-delete {
            background: #7f8c8d;
            color: #fff;
            font-weight: 600;
            font-size: 1.3rem;
            box-shadow: 0 5px 0 #5b6768;
        }

        /* zero button span */
        .btn-zero {
            grid-column: span 2;
        }

        /* hover effects for desktop */
        @media (hover: hover) {
            .btn:hover {
                filter: brightness(1.08);
                transform: translateY(-1px);
                box-shadow: 0 6px 0 #0f141c;
            }
            .btn:active {
                transform: translateY(3px);
                box-shadow: 0 2px 0 #0f141c;
            }
            .btn-operator:hover {
                background: #fcaa2c;
            }
            .btn-equals:hover {
                background: #3be282;
            }
        }

        /* small screen adjustments */
        @media (max-width: 480px) {
            .calculator {
                padding: 18px 16px 24px;
            }
            .btn {
                padding: 14px 0;
                font-size: 1.3rem;
            }
            .current-operand {
                font-size: 2.5rem;
            }
            .buttons {
                gap: 10px;
            }
        }

        /* subtle footer */
        .credit {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #6a7b8c;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="previous-operand" id="previousDisplay"></div>
        <div class="current-operand" id="currentDisplay">0</div>
    </div>
    <div class="buttons">
        <!-- Row 1 -->
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-delete" data-action="delete">⌫</button>
        <button class="btn btn-function" data-operator="%">%</button>
        <button class="btn btn-operator" data-operator="/">÷</button>

        <!-- Row 2 -->
        <button class="btn" data-number="7">7</button>
        <button class="btn" data-number="8">8</button>
        <button class="btn" data-number="9">9</button>
        <button class="btn btn-operator" data-operator="*">×</button>

        <!-- Row 3 -->
        <button class="btn" data-number="4">4</button>
        <button class="btn" data-number="5">5</button>
        <button class="btn" data-number="6">6</button>
        <button class="btn btn-operator" data-operator="-">−</button>

        <!-- Row 4 -->
        <button class="btn" data-number="1">1</button>
        <button class="btn" data-number="2">2</button>
        <button class="btn" data-number="3">3</button>
        <button class="btn btn-operator" data-operator="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-zero" data-number="0">0</button>
        <button class="btn" data-number=".">.</button>
        <button class="btn btn-equals" data-action="equals">=</button>
    </div>
    <div class="credit">professional calculator · precision mode</div>
</div>

<script>
    // ---------- Professional Calculator Core ----------
    // State variables
    let currentOperand = '0';      // displayed on screen
    let previousOperand = '';       // stored operand for operation
    let operation = null;           // current operation (+, -, *, /, %)
    let shouldResetScreen = false;   // flag to reset after equals or operator

    // DOM elements
    const previousDisplayElem = document.getElementById('previousDisplay');
    const currentDisplayElem = document.getElementById('currentDisplay');

    // Helper: update the UI
    function updateDisplay() {
        // format current operand: limit length but keep precision for large numbers
        let displayCurrent = currentOperand;
        if (displayCurrent === '') displayCurrent = '0';
        // handle decimal trailing nicely: avoid scientific notation if too long? but keep user friendly
        if (displayCurrent.length > 18 && !displayCurrent.includes('e')) {
            // optional: trim visually but not breaking logic
            displayCurrent = parseFloat(displayCurrent).toPrecision(12);
        }
        currentDisplayElem.innerText = displayCurrent;

        // show previous operand and operator
        if (operation !== null && previousOperand !== '') {
            let opSymbol = '';
            switch (operation) {
                case '+': opSymbol = '+'; break;
                case '-': opSymbol = '−'; break;
                case '*': opSymbol = '×'; break;
                case '/': opSymbol = '÷'; break;
                case '%': opSymbol = '%'; break;
                default: opSymbol = operation;
            }
            previousDisplayElem.innerText = `${previousOperand} ${opSymbol}`;
        } else {
            previousDisplayElem.innerText = '';
        }
    }

    // input number or decimal point
    function appendNumber(number) {
        if (shouldResetScreen) {
            resetCurrentOperand();
            shouldResetScreen = false;
        }
        // handle decimal point edge cases
        if (number === '.') {
            if (currentOperand.includes('.')) return; // already has decimal
            if (currentOperand === '' || currentOperand === '0') {
                currentOperand = '0.';
                updateDisplay();
                return;
            }
        }
        // avoid too many digits (safety limit)
        if (currentOperand.replace(/\./g, '').length >= 16 && number !== '.') return;

        // replace initial zero unless it's "0." for decimal
        if (currentOperand === '0' && number !== '.') {
            currentOperand = number;
        } else {
            currentOperand += number;
        }
        updateDisplay();
    }

    // reset the current operand to fresh state
    function resetCurrentOperand() {
        currentOperand = '0';
    }

    // clear everything (AC)
    function clearAll() {
        currentOperand = '0';
        previousOperand = '';
        operation = null;
        shouldResetScreen = false;
        updateDisplay();
    }

    // delete last character (backspace)
    function deleteLast() {
        if (shouldResetScreen) {
            resetCurrentOperand();
            shouldResetScreen = false;
            updateDisplay();
            return;
        }
        if (currentOperand.length === 1 || (currentOperand.length === 2 && currentOperand.startsWith('-'))) {
            currentOperand = '0';
        } else {
            currentOperand = currentOperand.slice(0, -1);
            if (currentOperand === '' || currentOperand === '-') currentOperand = '0';
        }
        updateDisplay();
    }

    // perform arithmetic based on chosen operator
    function computeResult() {
        if (operation === null || previousOperand === '' || currentOperand === '') return false;
        let prev = parseFloat(previousOperand);
        let current = parseFloat(currentOperand);
        if (isNaN(prev) || isNaN(current)) return false;

        let result = null;
        switch (operation) {
            case '+':
                result = prev + current;
                break;
            case '-':
                result = prev - current;
                break;
            case '*':
                result = prev * current;
                break;
            case '/':
                if (current === 0) {
                    alert("Math Error: Division by zero");
                    clearAll();
                    return false;
                }
                result = prev / current;
                break;
            case '%':
                result = prev % current;
                break;
            default:
                return false;
        }

        // handle rounding for floating point artifacts
        if (result !== null) {
            // limit to 12 decimal places for cleanliness but preserve scientific if needed
            if (Math.abs(result) < 1e-12 && result !== 0) result = 0;
            // avoid very long decimals: use parseFloat to round nicely
            let roundedResult = parseFloat(result.toFixed(12));
            currentOperand = roundedResult.toString();
            // remove trailing .0 if integer
            if (currentOperand.includes('.') && currentOperand.endsWith('.0')) {
                currentOperand = currentOperand.slice(0, -2);
            }
            previousOperand = '';
            operation = null;
            shouldResetScreen = true; // next input will overwrite
            updateDisplay();
            return true;
        }
        return false;
    }

    // choose operator (+, -, *, /, %)
    function setOperator(op) {
        // If we have a pending operation & we are not in reset state, compute previous first
        if (operation !== null && !shouldResetScreen && previousOperand !== '') {
            // evaluate before setting new operator
            const success = computeResult();
            if (success) {
                // after compute, currentOperand is result, and we want to set new operation
                // but computeResult sets shouldResetScreen = true, so we need to preserve currentOperand as previous
                previousOperand = currentOperand;
                operation = op;
                shouldResetScreen = true;  // next number entry will start fresh
                updateDisplay();
                return;
            }
        }

        // If we have current operand valid
        if (currentOperand === '' || currentOperand === '0' && op === '%') {
            // edge for % with zero: allow but use 0 as base
        }
        if (previousOperand !== '' && operation !== null && shouldResetScreen) {
            // after equals, we directly replace operation without computing
            previousOperand = currentOperand;
            operation = op;
            shouldResetScreen = true;
            updateDisplay();
            return;
        }

        // Normal flow: store current operand as previous
        if (currentOperand !== '') {
            previousOperand = currentOperand;
            operation = op;
            shouldResetScreen = true;
            updateDisplay();
        }
    }

    // equals action: evaluate pending operation
    function evaluate() {
        if (operation === null || previousOperand === '') {
            // if no pending operation but just show current
            shouldResetScreen = true;
            updateDisplay();
            return;
        }
        computeResult();
        // after computeResult, operation is cleared and shouldResetScreen set to true
    }

    // handle percentage special as quick operator: percent of current value
    // For professional style, we implement as standard modulo when used as operator,
    // but also percent quick conversion (x% => x/100) if pressed standalone? 
    // According to professional calculators: % key on an operand converts to percent.
    // But to keep consistent, we treat % as binary operator (modulo) when used between two numbers.
    // Additional shortcut: if no previous operand and % pressed, compute percentage of current (x% = x/100)
    // However many professional designs treat % as unary percent. Let's implement unary percent on current operand.
    // BUT my previous setOperator uses it as binary modulo. For better professional experience:
    // If pressed with no pending operation, it converts current operand to percent (value / 100)
    // If pressed after an operator and a number, it works as modulo.
    // I'll refine: in button handler, if data-operator="%" we either apply unary percent if no pending operation OR treat as modulo if pending.
    // New enhanced percent logic:
    function handlePercent() {
        if (shouldResetScreen) {
            resetCurrentOperand();
            shouldResetScreen = false;
        }
        if (operation !== null && previousOperand !== '') {
            // if there is pending operation, treat as binary modulo operator
            setOperator('%');
        } else {
            // unary percent: convert current operand to percentage (value / 100)
            let val = parseFloat(currentOperand);
            if (isNaN(val)) val = 0;
            let percentVal = val / 100;
            currentOperand = percentVal.toString();
            // Remove trailing zeros for neatness
            if (currentOperand.includes('.') && currentOperand.split('.')[1]?.length > 10) {
                currentOperand = parseFloat(currentOperand).toString();
            }
            updateDisplay();
            shouldResetScreen = true;
        }
    }

    // Keyboard support (pro touch)
    function handleKeyboard(e) {
        const key = e.key;
        // numbers 0-9
        if (/[0-9]/.test(key)) {
            e.preventDefault();
            appendNumber(key);
        }
        // decimal point
        else if (key === '.') {
            e.preventDefault();
            appendNumber('.');
        }
        // operators
        else if (key === '+' || key === '-') {
            e.preventDefault();
            setOperator(key);
        }
        else if (key === '*') {
            e.preventDefault();
            setOperator('*');
        }
        else if (key === '/') {
            e.preventDefault();
            setOperator('/');
        }
        else if (key === '%') {
            e.preventDefault();
            handlePercent();   // use enhanced percent logic
        }
        // Enter or = for equals
        else if (key === 'Enter' || key === '=') {
            e.preventDefault();
            evaluate();
        }
        // Backspace for delete
        else if (key === 'Backspace') {
            e.preventDefault();
            deleteLast();
        }
        // Escape or Delete for clear all
        else if (key === 'Escape' || key === 'Delete') {
            e.preventDefault();
            clearAll();
        }
    }

    // -------- Event listeners for buttons (dynamic) --------
    function attachEvents() {
        // number buttons
        document.querySelectorAll('[data-number]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const number = btn.getAttribute('data-number');
                appendNumber(number);
            });
        });

        // operator buttons (except % and equals and clear/del)
        document.querySelectorAll('[data-operator]').forEach(btn => {
            const operator = btn.getAttribute('data-operator');
            if (operator === '%') {
                btn.addEventListener('click', (e) => {
                    handlePercent();
                });
            } else {
                btn.addEventListener('click', (e) => {
                    setOperator(operator);
                });
            }
        });

        // clear button
        const clearBtn = document.querySelector('[data-action="clear"]');
        if (clearBtn) clearBtn.addEventListener('click', () => clearAll());

        // delete button
        const deleteBtn = document.querySelector('[data-action="delete"]');
        if (deleteBtn) deleteBtn.addEventListener('click', () => deleteLast());

        // equals button
        const equalsBtn = document.querySelector('[data-action="equals"]');
        if (equalsBtn) equalsBtn.addEventListener('click', () => evaluate());
    }

    // Initialize and attach global keyboard handler
    function init() {
        attachEvents();
        window.addEventListener('keydown', handleKeyboard);
        updateDisplay();
    }

    // start the app
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM Auto Sales System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:0;
    padding:20px;
    background:#f2f2f2;
}

h2{
    text-align:center;
}

.dashboard{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input, button{
    padding:8px;
    margin:5px;
}

button{
    cursor:pointer;
}

.day-box{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content{
    background:white;
    width:90%;
    max-width:600px;
    margin:50px auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>GM Auto Sales System</h2>

<div class="dashboard">
    <h3>Dashboard</h3>
    <p>Total Quantity: <span id="totalQty">0</span></p>
    <p>Total Sale: <span id="totalSale">0</span></p>
</div>

<div class="dashboard">
    <h3>Add Sale</h3>
    <input type="date" id="date">
    <input type="text" id="product" placeholder="Product Name">
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="qty" placeholder="Quantity">
    <button onclick="addSale()">Add</button>
</div>

<div class="dashboard">
    <h3>Day List</h3>
    <div id="dayList"></div>
</div>

<!-- Modal -->
<div id="dayModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <input type="text" id="searchBox" placeholder="Search Product" onkeyup="searchProduct()">
        <div id="modalContent"></div>
        <hr>
        <button onclick="printDay()">Print</button>
        <button onclick="screenshotDay()">Screenshot</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
let salesData = JSON.parse(localStorage.getItem("salesData")) || [];

function saveData(){
    localStorage.setItem("salesData", JSON.stringify(salesData));
}

function addSale(){
    let date = document.getElementById("date").value;
    let product = document.getElementById("product").value;
    let price = document.getElementById("price").value;
    let qty = document.getElementById("qty").value;

    if(!date || !product || !price || !qty){
        alert("Fill all fields");
        return;
    }

    let total = price * qty;

    salesData.push({
        date, product, price, qty, total
    });

    saveData();
    loadDashboard();
    loadDays();
}

function loadDashboard(){
    let totalQty = 0;
    let totalSale = 0;

    salesData.forEach(item=>{
        totalQty += parseInt(item.qty);
        totalSale += parseFloat(item.total);
    });

    document.getElementById("totalQty").innerText = totalQty;
    document.getElementById("totalSale").innerText = totalSale;
}

function loadDays(){
    let dayList = document.getElementById("dayList");
    dayList.innerHTML = "";

    let uniqueDays = [...new Set(salesData.map(item=>item.date))];

    uniqueDays.forEach(day=>{
        dayList.innerHTML += `
            <div class="day-box">
                <span>${day}</span>
                <button onclick="openDay('${day}')">Open</button>
            </div>
        `;
    });
}

function openDay(date){
    let filtered = salesData.filter(item=>item.date===date);

    let html = "";
    let totalQty = 0;
    let totalSale = 0;

    filtered.forEach(item=>{
        totalQty += parseInt(item.qty);
        totalSale += parseFloat(item.total);

        html += `
            <p>
            Product: ${item.product}<br>
            Price: ${item.price}<br>
            Quantity: ${item.qty}<br>
            Total: ${item.total}
            </p>
            <hr>
        `;
    });

    html += `
        <h4>Total Quantity: ${totalQty}</h4>
        <h4>Total Sale: ${totalSale}</h4>
    `;

    document.getElementById("modalTitle").innerText = "Details of " + date;
    document.getElementById("modalContent").innerHTML = html;
    document.getElementById("dayModal").style.display="block";
}

function closeModal(){
    document.getElementById("dayModal").style.display="none";
}

function printDay(){
    let content = document.getElementById("modalContent").innerHTML;
    let win = window.open('');
    win.document.write(content);
    win.print();
}

function screenshotDay(){
    alert("Screenshot ke liye Windows + Shift + S dabayen");
}

function searchProduct(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let paragraphs = document.getElementById("modalContent").getElementsByTagName("p");

    for(let i=0;i<paragraphs.length;i++){
        if(paragraphs[i].innerText.toLowerCase().includes(value)){
            paragraphs[i].style.display="block";
        }else{
            paragraphs[i].style.display="none";
        }
    }
}

loadDashboard();
loadDays();
</script>

</body>
</html>
